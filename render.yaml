services:
  - type: web
    name: chattix-chat-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
        placeholder: "mongodb+srv://<username>:<password>@cluster.mongodb.net/chat-app"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false
        placeholder: "https://your-frontend-app.vercel.app"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
        placeholder: "Your Cloudinary Cloud Name"
      - key: CLOUDINARY_API_KEY
        sync: false
        placeholder: "Your Cloudinary API Key"
      - key: CLOUDINARY_API_SECRET
        sync: false
        placeholder: "Your Cloudinary API Secret"
      - key: EMAIL_USER
        sync: false
        placeholder: "your_gmail_address@gmail.com"
      - key: EMAIL_PASS
        sync: false
        placeholder: "Your Gmail App Password"
      - key: OTP_EXPIRE_MINUTES
        value: 5
